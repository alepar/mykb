syntax = "proto3";
package mykb.v1;
option go_package = "mykb/gen/mykb/v1;mykbv1";

service KBService {
  rpc IngestURL(IngestURLRequest) returns (stream IngestProgress);
  rpc IngestURLs(IngestURLsRequest) returns (stream IngestURLsProgress);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
  rpc GetDocuments(GetDocumentsRequest) returns (GetDocumentsResponse);
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  // Wiki ingest (synchronous; bypasses crawler since the body is already markdown).
  rpc IngestMarkdown(IngestMarkdownRequest) returns (IngestMarkdownResponse);
  // List documents belonging to a given wiki, returning URL + content_hash + id for sync diffing.
  rpc ListWikiDocuments(ListWikiDocumentsRequest) returns (ListWikiDocumentsResponse);
}

message IngestURLRequest {
  string url = 1;
  bool force = 2;
}

message IngestProgress {
  string document_id = 1;
  string status = 2;
  string message = 3;
  int32 chunks_total = 4;
  int32 chunks_processed = 5;
}

message IngestURLsRequest {
  repeated string urls = 1;
  bool force = 2;
}

message IngestURLsProgress {
  int32 current = 1;
  int32 total = 2;
  string url = 3;
  string stage = 4;
  string error = 5;
}

message QueryRequest {
  string query = 1;
  int32 top_k = 2;
  int32 vector_depth = 3;
  int32 fts_depth = 4;
  int32 rerank_depth = 5;
  bool no_merge = 6;
}

message QueryResponse {
  repeated QueryResult results = 1;
}

message QueryResult {
  string chunk_id = 1;
  string document_id = 2;
  int32 chunk_index = 3;
  float score = 4;
  string text = 5;
  int32 chunk_index_end = 6;
}

message Document {
  string id = 1;
  string url = 2;
  string title = 3;
  string status = 4;
  string error = 5;
  int32 chunk_count = 6;
  int64 created_at = 7;
  int64 crawled_at = 8;
  string content = 9;
  int64 updated_at = 10;
  string step = 11;
  string state = 12;
}

message ListDocumentsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListDocumentsResponse {
  repeated Document documents = 1;
  int32 total = 2;
}

message GetDocumentsRequest {
  repeated string ids = 1;
  bool include_content = 2;
}

message GetDocumentsResponse {
  repeated Document documents = 1;
}

message DeleteDocumentRequest {
  string id = 1;
}

message DeleteDocumentResponse {}

message IngestMarkdownRequest {
  string url = 1;          // synthetic, e.g. wiki://main/concepts/foo.md
  string title = 2;        // optional; otherwise extracted by the server
  string body = 3;         // markdown including frontmatter
  string content_hash = 4; // sha256 of body, for idempotent re-ingest
}

message IngestMarkdownResponse {
  string document_id = 1;
  int32 chunks = 2;
  bool was_noop = 3;       // true if content_hash matched the existing doc and we skipped
}

message ListWikiDocumentsRequest {
  string wiki_name = 1;
}

message ListWikiDocumentsResponse {
  repeated WikiDocument documents = 1;
}

message WikiDocument {
  string id = 1;
  string url = 2;
  string content_hash = 3;
}
