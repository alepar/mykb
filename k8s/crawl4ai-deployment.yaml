apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl4ai
  namespace: mykb
  labels:
    app: crawl4ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawl4ai
  template:
    metadata:
      labels:
        app: crawl4ai
    spec:
      nodeSelector:
        kubernetes.io/hostname: hass
      containers:
        - name: crawl4ai
          image: unclecode/crawl4ai:latest
          ports:
            - containerPort: 11235
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 11235
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 11235
            initialDelaySeconds: 30
            periodSeconds: 20
