apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawl4ai
  namespace: mykb
  labels:
    app: crawl4ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawl4ai
  template:
    metadata:
      labels:
        app: crawl4ai
    spec:
      nodeSelector:
        kubernetes.io/hostname: hass
      containers:
        - name: crawl4ai
          image: unclecode/crawl4ai:latest
          ports:
            - containerPort: 11235
          env:
            - name: MAX_CONCURRENT_TASKS
              value: "5"
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 11235
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 11235
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
