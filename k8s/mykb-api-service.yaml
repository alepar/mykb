apiVersion: v1
kind: Service
metadata:
  name: mykb-api-grpc
  namespace: mykb
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
spec:
  selector:
    app: mykb-api
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mykb-api-http
  namespace: mykb
spec:
  selector:
    app: mykb-api
  ports:
    - port: 9091
      targetPort: 9091
  type: ClusterIP
