apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: mykb
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: hass
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:17
              command:
                - /bin/sh
                - -c
                - |
                  find /backups -name "*.dump" -mtime +30 -delete
                  pg_dump -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Fc \
                    -f "/backups/mykb-$(date +%Y%m%d).dump"
                  echo "Backup complete: mykb-$(date +%Y%m%d).dump"
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              hostPath:
                path: /backup/mykb-postgres
                type: Directory
